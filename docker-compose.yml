# Compose pro portal na VPS Hostinger (Traefik em network host na mesma máquina).
#
# Traefik:
#   - Roda em `network_mode: host` (escuta direto 80/443 do host)
#   - Provider Docker com exposedbydefault=false
#   - Redirect HTTP→HTTPS configurado globalmente (não precisa middleware aqui)
#   - certresolver `letsencrypt` (ACME HTTP challenge via entrypoint `web`)
#
# Como Traefik tá em host network, ele alcança qualquer container por bridge.
# A network default do compose (zimbanet_default) basta — não precisa external.
#
# O arquivo .env.production na mesma pasta supre build args (NEXT_PUBLIC_*)
# e runtime env (chaves privadas).

services:
  portal:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    image: zimbanet-portal:latest
    container_name: zimbanet-portal
    restart: unless-stopped
    env_file:
      - .env.production
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=zimbanet_default"

      # HTTPS — Traefik faz o redirect HTTP→HTTPS automaticamente
      - "traefik.http.routers.zimbanet.rule=Host(`teste.zimbanet.com`)"
      - "traefik.http.routers.zimbanet.entrypoints=websecure"
      - "traefik.http.routers.zimbanet.tls=true"
      - "traefik.http.routers.zimbanet.tls.certresolver=letsencrypt"

      - "traefik.http.services.zimbanet.loadbalancer.server.port=3000"

  radar:
    build:
      context: ./radar
      dockerfile: Dockerfile
    image: zimbanet-radar:latest
    container_name: zimbanet-radar
    restart: unless-stopped
    env_file:
      - ./radar/.env.production
    expose:
      - "8100"
    # Sem labels Traefik — radar é privado, só o portal acessa via DNS interno `http://radar:8100`
